quarkus.http.port=8080

# CORS para o frontend Angular local
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

# H2 em arquivo local
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/authapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# Console do H2
#quarkus.h2.console.enabled=true
#quarkus.h2.console.path=/h2

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=authapp-backend
smallrye.jwt.sign.key.location=privateKey.pem

# OpenAPI
quarkus.smallrye-openapi.path=/q/openapi

# Logs
quarkus.log.category."com.example.authapp".level=INFO