<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Página Inicial</mat-card-title>
      <mat-card-subtitle>Usuário autenticado</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="success-box">
        SUCESSO! VOCÊ ESTÁ LOGADO
      </div>

      <div class="user-box" *ngIf="user">
        <p><strong>Nome:</strong> {{ user.fullName }}</p>
        <p><strong>E-mail:</strong> {{ user.email }}</p>
        <p><strong>CEP:</strong> {{ user.cep || '-' }}</p>
        <p><strong>Cidade:</strong> {{ user.city || '-' }}</p>
        <p><strong>UF:</strong> {{ user.state || '-' }}</p>
        <p><strong>Informações adicionais:</strong> {{ user.additionalInfo || '-' }}</p>
        <p><strong>Observações:</strong> {{ user.notes || '-' }}</p>
      </div>

      <div class="actions-row">
        <button mat-flat-button color="primary" type="button" (click)="logout()">
          Sair
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
