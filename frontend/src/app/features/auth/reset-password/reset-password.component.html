<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Redefinir senha</mat-card-title>
      <mat-card-subtitle>Informe e-mail, token e nova senha</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="form-grid-single" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Token</mat-label>
          <input matInput formControlName="token" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nova senha</mat-label>
          <input matInput type="password" formControlName="newPassword" />
          <mat-hint>
            Mínimo 8 caracteres, com maiúscula, minúscula e número
          </mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirmar nova senha</mat-label>
          <input matInput type="password" formControlName="confirmNewPassword" />
          <mat-error *ngIf="passwordMismatch">
            A nova senha e a confirmação não conferem
          </mat-error>
        </mat-form-field>

        <div class="actions-row">
          <button mat-flat-button color="primary" type="submit" [disabled]="loading">
            Redefinir senha
          </button>
          <a mat-stroked-button routerLink="/login">Voltar</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
