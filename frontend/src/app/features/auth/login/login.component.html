<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Acesse a aplicação</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="form-grid-single form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="email.hasError('required')">E-mail é obrigatório</mat-error>
          <mat-error *ngIf="email.hasError('email')">Informe um e-mail válido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
          />
          <mat-error *ngIf="password.hasError('required')">Senha é obrigatória</mat-error>
        </mat-form-field>

        <div class="actions-row">
          <button mat-flat-button color="primary" type="submit" [disabled]="loading">
            Entrar
          </button>

          <a mat-stroked-button routerLink="/register">Criar conta</a>
          <a mat-button routerLink="/forgot-password">Esqueci minha senha</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
