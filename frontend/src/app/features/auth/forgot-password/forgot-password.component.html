<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Esqueci minha senha</mat-card-title>
      <mat-card-subtitle>Gerar token de redefinição</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="form-grid-single" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.controls.email.hasError('required')">
            E-mail é obrigatório
          </mat-error>
          <mat-error *ngIf="form.controls.email.hasError('email')">
            Informe um e-mail válido
          </mat-error>
        </mat-form-field>

        <div class="actions-row">
          <button mat-flat-button color="primary" type="submit" [disabled]="loading">
            Gerar token
          </button>
          <a mat-stroked-button routerLink="/login">Voltar</a>
        </div>
      </form>

      <div class="token-box" *ngIf="generatedToken">
        <p><strong>Token gerado:</strong></p>
        <code>{{ generatedToken }}</code>

        <p class="muted" *ngIf="expiresAt">
          Expira em: {{ expiresAt }}
        </p>

        <div class="actions-row">
          <button mat-flat-button color="accent" type="button" (click)="goToReset()">
            Ir para redefinição
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
